server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Django backend via Railway private network.
    # Using a variable forces nginx to re-resolve the hostname per request
    # (honoring the resolver's TTL) instead of caching the IP at startup —
    # Railway assigns a new private IP on every backend redeploy.
    location /api/ {
        set $backend_upstream "http://backend.railway.internal:8000";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The agent streams its run over SSE. Buffering would hold the whole
        # response back and release it at once, and HTTP/1.0 with keep-alive
        # off would close the connection early.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # An agent run can think for minutes between tokens.
        proxy_read_timeout 600s;
        # gzip buffers to fill a compression window, which stalls the stream.
        gzip off;
    }

    # Support Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
