server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Django backend via Railway private network.
    # Railway's private network is IPv6-only and *.railway.internal is only
    # resolvable by Railway's internal DNS (the nameserver in /etc/resolv.conf).
    # The entrypoint substitutes RAILWAY_DNS_RESOLVER at container start.
    # The variable in proxy_pass forces nginx to re-resolve per request
    # instead of caching a (possibly bogus) address at worker startup.
    location /api/ {
        resolver RAILWAY_DNS_RESOLVER ipv6=on valid=30s;
        set $backend http://backend.railway.internal:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host backend.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Support Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
