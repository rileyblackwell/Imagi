<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title>Imagi - Build and Run Your Business</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..700,0..100,0..1;1,9..144,400..700,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      // Mirrors the logic in src/shared/stores/theme.ts, which takes over after mount.
      ;(function () {
        var theme = localStorage.getItem('theme')
        var dark =
          theme === 'dark' ||
          ((!theme || theme === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        var root = document.documentElement
        root.classList.add(dark ? 'dark' : 'light')
        root.style.colorScheme = dark ? 'dark' : 'light'
      })()
    </script>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but Imagi doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
